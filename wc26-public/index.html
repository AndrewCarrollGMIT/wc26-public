<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light only;
  --ink:    #101A3E;   /* US navy - text, header */
  --ink-2:  #1B2A5E;   /* lighter navy - tz strip */
  --red:    #D7263D;   /* Canada red - live */
  --green:  #00794C;   /* Mexico green - qualification */
  --royal:  #2B4C9B;   /* US royal - 3rd place, links */
  --paper:  #F6F5F1;   /* warm concrete white */
  --card:   #FFFFFF;
  --line:   #E5E3DC;
  --dim:    #6E7385;
  --r: 10px;
  --shadow: 0 1px 2px rgba(16,26,62,.06), 0 4px 16px rgba(16,26,62,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--paper);color:var(--ink);
  font-family:'Archivo',system-ui,sans-serif;font-size:15px;line-height:1.5;
  min-height:100vh;
}

/* ══ The tricolor band - the one mark that means "26" ══ */
.band, header::before{
  content:"";display:block;height:4px;
  background:linear-gradient(90deg,
    var(--red) 0 33.33%, var(--green) 33.33% 66.66%, var(--royal) 66.66% 100%);
}

/* ── Header ── */
header{background:var(--ink);position:sticky;top:0;z-index:50}
.head-inner{
  max-width:1060px;margin:0 auto;padding:18px 18px 4px;
  display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
}
.eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;
  color:rgba(255,255,255,.55);margin-bottom:4px;
}
.wordmark{
  font-family:'Anton',sans-serif;font-size:30px;line-height:1;
  color:#fff;letter-spacing:.025em;text-transform:uppercase;
  display:flex;align-items:center;gap:9px;
}
.two6{
  display:inline-block;background:var(--red);color:#fff;
  padding:2px 9px 3px;transform:skewX(-8deg);
  font-family:'Anton',sans-serif;
}
.two6 > span{display:inline-block;transform:skewX(8deg)}
.stamp{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.5);text-align:right;white-space:nowrap;padding-bottom:5px;
}

nav{max-width:1060px;margin:0 auto;display:flex;padding:6px 8px 0;gap:2px}
.tab{
  appearance:none;border:none;background:none;cursor:pointer;
  color:rgba(255,255,255,.55);font-family:'Archivo';font-weight:700;
  font-size:13px;letter-spacing:.09em;text-transform:uppercase;
  padding:11px 15px 12px;position:relative;transition:color .15s;white-space:nowrap;
}
.tab:hover{color:rgba(255,255,255,.85)}
.tab[aria-selected="true"]{color:#fff}
.tab[aria-selected="true"]::after{
  content:"";position:absolute;left:13px;right:13px;bottom:0;height:4px;
  background:linear-gradient(90deg,var(--red) 0 33.33%,var(--green) 33.33% 66.66%,var(--royal) 66.66% 100%);
}
.tab:focus-visible{outline:2px solid #fff;outline-offset:-2px}
.badge{
  display:inline-block;min-width:18px;margin-left:6px;padding:1px 5px;
  background:var(--red);color:#fff;border-radius:9px;
  font-size:10px;font-weight:800;vertical-align:2px;letter-spacing:0;
}

/* ── Timezone strip ── */
.tz-strip{background:var(--ink-2)}
.tz-inner{max-width:1060px;margin:0 auto;padding:7px 18px;display:flex;align-items:center;gap:7px}
.tz-label{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.18em;text-transform:uppercase;font-weight:600;margin-right:2px}
.tz-btn{
  appearance:none;border:1px solid rgba(255,255,255,.25);background:none;
  color:rgba(255,255,255,.65);font-family:'Archivo';font-weight:600;font-size:12px;
  padding:3px 12px;border-radius:99px;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tz-btn:hover{color:#fff;border-color:rgba(255,255,255,.6)}
.tz-btn.active{background:#fff;border-color:#fff;color:var(--ink)}
.tz-btn:focus-visible{outline:2px solid #fff;outline-offset:1px}

/* ── Layout ── */
main{max-width:1060px;margin:0 auto;padding:22px 16px 80px}
.view{display:none}.view.on{display:block}

/* ── Live ── */
.live-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.lcard{
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  border:1px solid var(--line);overflow:hidden;position:relative;
}
.lcard::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
  background:linear-gradient(180deg,var(--red) 0 33.33%,var(--green) 33.33% 66.66%,var(--royal) 66.66% 100%);
}
.lcard-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 0 20px;
  font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;
}
.live-pip{display:flex;align-items:center;gap:6px;color:var(--red)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.3s infinite;flex:0 0 auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.lcard-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:16px 16px 18px 20px}
.lt{display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center}
.lt .flag{font-size:2.3em;line-height:1}
.lt .name{font-size:13px;font-weight:700;color:var(--ink)}
.bigscore{
  font-family:'Anton',sans-serif;font-size:46px;line-height:1;color:var(--ink);
  letter-spacing:.02em;text-align:center;font-variant-numeric:tabular-nums;
}
.lcard-foot{
  background:var(--paper);padding:8px 16px 8px 20px;border-top:1px solid var(--line);
  font-size:10px;font-weight:600;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;
}

/* ── Fixtures ── */
.fx-controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
select{
  background:var(--card);color:var(--ink);border:1.5px solid var(--ink);
  border-radius:99px;padding:7px 14px;font-family:'Archivo';font-weight:600;
  font-size:13px;cursor:pointer;
}
select:focus-visible{outline:2px solid var(--royal);outline-offset:1px}
.fx-date-hdr{
  font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink);margin:26px 0 10px;padding-bottom:7px;position:relative;
}
.fx-date-hdr::after{
  content:"";position:absolute;left:0;bottom:0;width:34px;height:4px;
  background:linear-gradient(90deg,var(--red) 0 33.33%,var(--green) 33.33% 66.66%,var(--royal) 66.66% 100%);
}
.fx-date-hdr:first-child{margin-top:0}
.fx{
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:13px 16px;margin-bottom:9px;border:1px solid var(--line);
}
.fx.live{border-color:var(--red);box-shadow:0 0 0 2px rgba(215,38,61,.14),var(--shadow)}
.fside{display:flex;align-items:center;gap:8px;min-width:0}
.fside.away{justify-content:flex-end;text-align:right}
.fside .flag{font-size:1.25em;flex:0 0 auto}
.fside .tn{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 0;min-width:0}
.fside .tc{display:none;font-weight:800;font-size:12.5px;letter-spacing:.06em;color:var(--ink);flex:0 0 auto}
.fmid{text-align:center;min-width:80px}
.fmid .score{font-family:'Anton',sans-serif;font-weight:400;font-size:23px;color:var(--ink);letter-spacing:.04em;font-variant-numeric:tabular-nums}
.fmid .ko{font-weight:800;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums}
.fmid .sub{display:block;font-size:9.5px;font-weight:700;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.fmid .sub.live-sub{color:var(--red)}
.venue-row{
  grid-column:1/-1;text-align:center;font-size:9.5px;font-weight:600;
  color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:-1px;
}

/* ── Groups ── */
.groups-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(315px,1fr))}
.gcard{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden}
.gcard-head{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;background:var(--ink);
}
.gcard-head h2{
  font-size:10px;font-weight:700;letter-spacing:.3em;color:rgba(255,255,255,.55);
  text-transform:uppercase;
}
.gcard-head .glet{
  font-family:'Anton',sans-serif;font-size:26px;line-height:1;color:#fff;
  margin-left:auto;
}
table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
th{font-size:9.5px;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:8px 4px;text-align:center}
th.tcol{text-align:left;padding-left:14px}
td{padding:9px 4px;text-align:center;border-top:1px solid var(--line)}
td.tcol{text-align:left;padding-left:14px;font-weight:600}
td.tcol .row{display:flex;align-items:center;gap:8px}
td.pts{font-family:'Anton',sans-serif;font-size:16px;color:var(--ink)}
tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--green)}
tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--royal)}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin:0 2px 18px;font-size:12px;font-weight:600;color:var(--dim)}
.lkey{display:flex;align-items:center;gap:7px}
.lkey i{width:11px;height:11px;border-radius:2px}
.lkey i.g{background:var(--green)}
.lkey i.b{background:var(--royal)}

/* ── Empty / footer ── */
.empty{text-align:center;padding:64px 20px;color:var(--dim)}
.empty h3{font-family:'Anton',sans-serif;font-size:21px;color:var(--ink);margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
footer{max-width:1060px;margin:0 auto;padding:0 16px 36px;font-size:11px;color:var(--dim);text-align:center}

/* ── Motion & accessibility ── */
@media(prefers-reduced-motion:reduce){.pulse{animation:none}}
@media(prefers-color-scheme:dark){
  html,body{background:#F6F5F1 !important;color:#101A3E !important}
  .gcard,.lcard,.fx,select{background:#fff !important;color:#101A3E !important}
}

/* ── Mobile ── */
@media(max-width:600px){
  html,body{overflow-x:hidden;max-width:100vw}
  main{padding:16px 12px 80px}
  .head-inner{padding:14px 14px 2px}
  .wordmark{font-size:24px}
  .stamp{font-size:9.5px}
  nav{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;padding:4px 6px 0}
  nav::-webkit-scrollbar{display:none}
  .tab{font-size:12px;padding:10px 12px 11px;white-space:nowrap}
  .tz-inner{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;gap:6px;padding:7px 14px}
  .tz-inner::-webkit-scrollbar{display:none}
  .tz-label{display:none}
  .groups-grid{grid-template-columns:1fr}
  .live-grid{grid-template-columns:1fr}
  table th:nth-child(3),table td:nth-child(3),
  table th:nth-child(4),table td:nth-child(4),
  table th:nth-child(5),table td:nth-child(5){display:none}
  .fside .tn{display:none}
  .fside .tc{display:inline}
  .fx{padding:11px 11px;gap:7px}
  .fmid{min-width:66px}
  .bigscore{font-size:38px}
}
</style>
</head>

</header>

<main>

        <option value="finished">Finished</option>
      </select>

    <div id="fxList"></div>
  </section>
  <section class="view" id="view-groups">
    <div class="legend">

      <span class="lkey"><i class="b"></i> Best 3rd place</span>

    <div class="groups-grid" id="groupsGrid"></div>
  </section>
</main>

<footer>Group stage · 72 matches · 16 stadiums across Canada, the United States and Mexico · All kick-off times shown in your selected timezone</footer>

function isoToEmoji(iso2) {
  if (!iso2) return "🏳";
  const s = iso2.toUpperCase();
  const L = {"ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","WAL":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","GB-ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","GB-SCT":"🏴󠁧󠁢󠁳󠁣󠁴󠁿"};
  if (L[s]) return L[s];
  if (s.length === 2) return [...s].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join("");
  return "🏳";
}

  fmtDay  = new Intl.DateTimeFormat("en-AU", {timeZone:TZ, weekday:"long", day:"numeric", month:"long"});

  b.classList.add("active");
  setTZ(b.dataset.tz);
  renderFixtures();
}));

document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  document.querySelectorAll(".tab").forEach(x => x.setAttribute("aria-selected", x === t));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("on", v.id === "view-" + t.dataset.view));
}));

function fxStatus(m) {
  if (m.finished || m.status === "finished") return "finished";
  if (m.status === "live") return "live";
  const ko = new Date(m.date_iso), now = new Date();
  if (now > ko && now - ko < 120*60*1000) return "live";
  return "upcoming";
}

function computeStandings() {
  const init = id => ({ team:teamById[id], played:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 });
  const grps = {};
  for (const g of Object.keys(DATA.groups)) grps[g] = DATA.groups[g].map(init);
  for (const m of DATA.games) {
    if (!m.finished) continue;
    const grp = grps[m.group];
    const h = grp.find(r => r.team.id === m.home);
    const a = grp.find(r => r.team.id === m.away);
    if (!h || !a) continue;
    h.played++; a.played++;
    h.gf += m.home_score; h.ga += m.away_score;
    a.gf += m.away_score; a.ga += m.home_score;
    if (m.home_score > m.away_score) { h.w++; h.pts+=3; a.l++; }
    else if (m.home_score < m.away_score) { a.w++; a.pts+=3; h.l++; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  }
  for (const g of Object.keys(grps)) {
    grps[g].forEach(r => r.gd = r.gf - r.ga);
    grps[g].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.team.name.localeCompare(b.team.name));
  }
  return grps;
}

function renderLive() {
  const live = DATA.games.filter(m => fxStatus(m) === "live");
  const grid = $("#liveGrid"); grid.innerHTML = "";
  const badge = $("#liveBadge");
  badge.style.display = live.length ? "inline-block" : "none";
  badge.textContent = live.length;

  if (!live.length) {
    const next = DATA.games.filter(m => fxStatus(m) === "upcoming").sort((a,b) => new Date(a.date_iso)-new Date(b.date_iso))[0];
    const msg = next
      ? `Next match: ${teamById[next.home].name} vs ${teamById[next.away].name} · ${fmtTime.format(new Date(next.date_iso))}`
      : "Group stage complete";
    grid.append(el("div","empty",`<h3>No matches live right now</h3><p>${esc(msg)}</p>`));
    return;
  }

  live.forEach(m => {
    const h = teamById[m.home], a = teamById[m.away];
    const st = stadiumById[m.stadium_id];
    const card = el("div","lcard");
    const minLabel = m.status === "HT" ? "Half Time" : "LIVE";
    card.innerHTML = `
      <div class="lcard-top">
        <span>Group ${esc(m.group)} · MD${m.matchday}</span>
        <span class="live-pip"><span class="pulse"></span>${esc(minLabel)}</span>
      </div>
      <div class="lcard-body">
        <div class="lt"><span class="flag">${isoToEmoji(h.iso2)}</span><span class="name">${esc(h.name)}</span></div>
        <div class="bigscore">${m.home_score ?? 0}–${m.away_score ?? 0}</div>
        <div class="lt"><span class="flag">${isoToEmoji(a.iso2)}</span><span class="name">${esc(a.name)}</span></div>
      </div>
      <div class="lcard-foot">${st ? esc(st.name) + " · " + esc(st.city) : ""}</div>`;
    grid.append(card);
  });
}

function renderFixtures() {
  const wG = $("#fxGroup").value, wM = $("#fxMatchday").value, wS = $("#fxStatus").value;
  const list = $("#fxList"); list.innerHTML = "";
  const fx = DATA.games
    .filter(m => wG === "all" || m.group === wG)
    .filter(m => wM === "all" || String(m.matchday) === wM)
    .filter(m => wS === "all" || fxStatus(m) === wS)
    .sort((a,b) => new Date(a.date_iso) - new Date(b.date_iso));

  if (!fx.length) { list.append(el("div","empty","<h3>No matches</h3><p>Try a different filter</p>")); return; }

  let lastDay = "";
  fx.forEach(m => {
    const d = new Date(m.date_iso);
    const day = fmtDay.format(d);
    if (day !== lastDay) { list.append(el("div","fx-date-hdr",esc(day))); lastDay = day; }
    const st = fxStatus(m), h = teamById[m.home], a = teamById[m.away], stad = stadiumById[m.stadium_id];
    const row = el("div","fx" + (st === "live" ? " live" : ""));
    const mid = st === "upcoming"
      ? `<span class="ko">${fmtTime.format(d)}</span><span class="sub">Grp ${esc(m.group)}</span>`
      : `<span class="score">${m.home_score ?? 0}–${m.away_score ?? 0}</span><span class="sub${st === "live" ? " live-sub" : ""}">${st === "live" ? "LIVE" : "FT"}</span>`;
    row.innerHTML = `
      <div class="fside"><span class="flag">${isoToEmoji(h.iso2)}</span><span class="tn">${esc(h.name)}</span><span class="tc">${esc(h.code)}</span></div>
      <div class="fmid">${mid}</div>
      <div class="fside away"><span class="tn">${esc(a.name)}</span><span class="tc">${esc(a.code)}</span><span class="flag">${isoToEmoji(a.iso2)}</span></div>`;
    if (stad) { const v = el("div","venue-row"); v.textContent = stad.name + " · " + stad.city; row.append(v); }
    list.append(row);
  });
}

function renderGroups() {
  const standings = computeStandings();
  const grid = $("#groupsGrid"); grid.innerHTML = "";
  for (const g of Object.keys(standings).sort()) {
    const card = el("div","gcard");
    card.innerHTML = `<div class="gcard-head"><h2>Group</h2><span class="glet">${esc(g)}</span></div>`;
    const tbl = el("table");
    tbl.innerHTML = `<thead><tr><th class="tcol">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th class="pts">Pts</th></tr></thead>`;
    const tb = el("tbody");
    standings[g].forEach((row, i) => {
      const rank = i+1;
      const tr = el("tr", rank <= 2 ? "q1" : rank === 3 ? "q3" : "");
      tr.innerHTML = `
        <td class="tcol"><div class="row"><span>${isoToEmoji(row.team.iso2)}</span>${esc(row.team.name)}</div></td>
        <td>${row.played}</td><td>${row.w}</td><td>${row.d}</td><td>${row.l}</td>
        <td>${row.gd > 0 ? "+" : ""}${row.gd}</td><td class="pts">${row.pts}</td>`;
      tb.append(tr);
    });
    tbl.append(tb); card.append(tbl); grid.append(card);
  }
}

function populateGroupFilter() {
  const sel = $("#fxGroup");
  sel.innerHTML = `<option value="all">All groups</option>` +
    Object.keys(DATA.groups).sort().map(g => `<option value="${g}">Group ${g}</option>`).join("");
}
["fxGroup","fxMatchday","fxStatus"].forEach(id => $("#"+id).addEventListener("change", renderFixtures));

populateGroupFilter(); renderLive(); renderFixtures(); renderGroups();


/* ── Score cache: persists last known scores across page refreshes ── */
const CACHE_KEY = 'wc26_scores_v2';

function saveScores() {
  const scores = {};
  DATA.games.forEach(g => {
    if (g.home_score > 0 || g.away_score > 0 || g.finished || g.status === 'live') {
      scores[g.id] = {
        h: g.home_score,
        a: g.away_score,
        f: g.finished,
        s: g.status
      };
    }
  });
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(scores)); } catch(e) {}
}

function restoreScores() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return;
    const scores = JSON.parse(raw);
    DATA.games.forEach(g => {
      if (scores[g.id]) {
        g.home_score = scores[g.id].h;
        g.away_score = scores[g.id].a;
        g.finished   = scores[g.id].f;
        g.status     = scores[g.id].s;
      }
    });
  } catch(e) {}
}

// Restore cached scores immediately on load, then re-render with them
restoreScores();
renderLive(); renderFixtures(); renderGroups();

/* Live polling */
const POLL_LIVE = 60_000, POLL_IDLE = 10*60_000;
const LIVE_ST = new Set(["1H","HT","2H","ET","BT","P","LIVE","INT"]);
const DONE_ST = new Set(["FT","AET","PEN"]);

const TEAM_ALIASES = {"turkey": "turkiye", "korea republic": "south korea", "czech republic": "czechia", "bosnia-herzegovina": "bosnia and herzegovina", "bosnia herzegovina": "bosnia and herzegovina", "congo dr": "dr congo", "democratic republic of congo": "dr congo", "cape verde islands": "cape verde", "usa": "united states", "cote d'ivoire": "ivory coast", "ir iran": "iran"};
const normName = n => { const k = String(n||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim(); return TEAM_ALIASES[k]||k; };
const teamsByName = {};
DATA.teams.forEach(t => { teamsByName[normName(t.name)] = t; });

function matchGame(r) {
  const h = teamsByName[normName(r.home)];
  const a = teamsByName[normName(r.away)];
  if (!h || !a) return null;
  return DATA.games.find(g => g.home === h.id && g.away === a.id) || null;
}

function applyRemote(j) {
  window.__dbg = window.__dbg || {poll:0};
  __dbg.src = j.source || '?'; __dbg.count = (j.fixtures||[]).length;
  __dbg.matched = 0; __dbg.applied = 0;
  if (!j.fixtures) return false;
  let changed = false;
  for (const r of j.fixtures) {
    const local = matchGame(r);
    if (!local) continue;
    __dbg.matched++;
    if (local.finished) continue; // never modify a locked result
    const scoreChanged = local.home_score !== (r.home_score ?? 0) || local.away_score !== (r.away_score ?? 0);
    const statusChanged = (LIVE_ST.has(r.status) && local.status !== "live") || (DONE_ST.has(r.status) && !local.finished);
    if (scoreChanged || statusChanged) { changed = true; __dbg.applied++; }
    // Never let a 0-0 NS payload wipe a real score (stale edge response)
    const downgrade = (r.home_score === 0 && r.away_score === 0 && r.status === "NS" &&
                       (local.home_score > 0 || local.away_score > 0 || local.status === "live"));
    if (!downgrade) {
      if (r.home_score != null) local.home_score = r.home_score;
      if (r.away_score != null) local.away_score = r.away_score;
    }
    if (LIVE_ST.has(r.status)) { local.status = "live"; local.finished = false; }
    else if (DONE_ST.has(r.status) || r.finished) { local.status = "finished"; local.finished = true; }
  }
  return changed;
}

function anyLive() {
  const now = Date.now();
  return DATA.games.some(g => { const ko = new Date(g.date_iso).getTime(); return now >= ko && now <= ko + 9e6 && !g.finished; });
}

async function poll() {
  try {
    const r = await fetch("/api/fixtures", { cache: "no-store" });
    if (!r.ok) return;
    const j = await r.json();
    if (applyRemote(j)) { saveScores(); renderLive(); renderFixtures(); renderGroups(); }
    window.__dbg.poll++;
    let bar = document.getElementById("dbgbar");
    if (!bar) { bar = document.createElement("div"); bar.id = "dbgbar";
      bar.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#101A3E;color:#fff;font:600 10px/1.6 monospace;padding:4px 10px;z-index:99;opacity:.92";
      document.body.appendChild(bar); }
    bar.textContent = "v3 | poll " + __dbg.poll + " | src " + __dbg.src + " | fixtures " + __dbg.count + " | matched " + __dbg.matched + " | changed " + __dbg.applied;
    const tzBtn = document.querySelector(".tz-btn.active");
    $("#stamp").textContent = "Updated " + new Date().toLocaleTimeString("en-AU", {timeZone:TZ, hour:"2-digit", minute:"2-digit", hour12:false}) + " · " + (tzBtn?.dataset.label || "SYD");
  } catch(e) { console.warn("Poll failed:", e.message);
    const bar2 = document.getElementById("dbgbar");
    if (bar2) bar2.textContent = "v3 | POLL ERROR: " + e.message; }
}

function schedule() { setTimeout(async () => { await poll(); schedule(); }, anyLive() ? POLL_LIVE : POLL_IDLE); }
poll().then(schedule);
</script>
