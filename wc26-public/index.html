<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #F2F4F7;
  --surface:  #FFFFFF;
  --surface2: #F8F9FB;
  --border:   #E4E7ED;
  --text:     #111827;
  --dim:      #6B7280;
  --navy:     #0F1F3D;
  --green:    #059669;
  --amber:    #D97706;
  --red:      #DC2626;
  --blue:     #2563EB;
  --radius:   12px;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}

/* ── Header ── */
header{background:var(--navy);position:sticky;top:0;z-index:50}
.head-inner{max-width:1080px;margin:0 auto;padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.wordmark{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:.08em;color:#fff}
.wordmark span{color:#F59E0B}
.stamp{font-size:11px;color:rgba(255,255,255,.5);text-align:right;white-space:nowrap}

nav{max-width:1080px;margin:0 auto;display:flex;padding:0 12px;gap:0}
.tab{appearance:none;border:none;background:none;color:rgba(255,255,255,.55);font-family:'Inter';font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:12px 16px 10px;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.85)}
.tab[aria-selected="true"]{color:#fff;border-bottom-color:#F59E0B}
.badge{display:inline-block;min-width:18px;margin-left:5px;padding:1px 5px;background:var(--red);color:#fff;border-radius:9px;font-size:10px;font-weight:700;vertical-align:2px}

/* ── TZ strip ── */
.tz-strip{background:var(--navy);border-top:1px solid rgba(255,255,255,.1)}
.tz-inner{max-width:1080px;margin:0 auto;padding:6px 16px;display:flex;align-items:center;gap:6px}
.tz-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-right:2px}
.tz-btn{appearance:none;border:1px solid rgba(255,255,255,.2);background:none;color:rgba(255,255,255,.55);font-family:'Inter';font-weight:600;font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tz-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.tz-btn.active{background:#F59E0B;border-color:#F59E0B;color:#000}

/* ── Layout ── */
main{max-width:1080px;margin:0 auto;padding:20px 16px 80px}
.view{display:none}.view.on{display:block}

/* ── Live cards ── */
.live-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
.lcard{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-md);border:2px solid var(--red);overflow:hidden}
.lcard-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0;font-size:11px;font-weight:600;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}
.live-pip{display:flex;align-items:center;gap:5px;color:var(--red);font-weight:700}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;flex:0 0 auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@media(prefers-reduced-motion:reduce){.pulse{animation:none}}
.lcard-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:14px 14px 18px}
.lt{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.lt .flag{font-size:2em;line-height:1}
.lt .name{font-size:13px;font-weight:600;color:var(--text)}
.bigscore{font-family:'Oswald';font-weight:700;font-size:38px;color:var(--navy);letter-spacing:.02em;text-align:center}
.lcard-foot{background:var(--surface2);padding:8px 14px;font-size:11px;color:var(--dim);text-align:center;text-transform:uppercase;letter-spacing:.05em;border-top:1px solid var(--border)}

/* ── Fixtures ── */
.fx-controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Inter';font-size:14px;cursor:pointer;box-shadow:var(--shadow)}
select:focus{outline:2px solid var(--blue);outline-offset:1px}
.fx-date-hdr{font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin:22px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fx-date-hdr:first-child{margin-top:0}
.fx{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;background:var(--surface);border-radius:10px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);transition:border-color .2s}
.fx.live{border-color:var(--red);box-shadow:0 0 0 2px rgba(220,38,38,.12),var(--shadow)}
.fside{display:flex;align-items:center;gap:7px;min-width:0}
.fside.away{justify-content:flex-end;text-align:right}
.fside .flag{font-size:1.1em;flex:0 0 auto}
.fside .tn{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 0;min-width:0}
.fside .tc{display:none;font-weight:700;font-size:12px;letter-spacing:.05em;color:var(--dim);flex:0 0 auto}
.fmid{text-align:center;min-width:76px}
.fmid .score{font-family:'Oswald';font-weight:700;font-size:20px;color:var(--navy);letter-spacing:.04em}
.fmid .ko{font-weight:700;font-size:15px;color:var(--navy)}
.fmid .sub{display:block;font-size:10px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.fmid .sub.live-sub{color:var(--red);font-weight:700}
.venue-row{grid-column:1/-1;text-align:center;font-size:10px;color:var(--dim);letter-spacing:.04em;text-transform:uppercase;margin-top:-2px}

/* ── Groups ── */
.groups-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(310px,1fr))}
.gcard{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.gcard-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.gcard-head h2{font-family:'Oswald';font-size:14px;font-weight:700;letter-spacing:.1em;color:var(--navy);text-transform:uppercase}
.gcard-head .glet{font-family:'Oswald';font-size:20px;font-weight:700;color:var(--blue);letter-spacing:.02em}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:10px;font-weight:600;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;padding:7px 4px;text-align:center}
th.tcol{text-align:left;padding-left:12px}
td{padding:8px 4px;text-align:center;border-top:1px solid var(--border)}
td.tcol{text-align:left;padding-left:12px;font-weight:500}
td.tcol .row{display:flex;align-items:center;gap:7px}
td.pts{font-family:'Oswald';font-weight:700;font-size:15px;color:var(--navy)}
tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--green)}
tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--amber)}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:14px 2px 20px;font-size:12px;color:var(--dim)}
.lkey{display:flex;align-items:center;gap:6px}
.lkey i{width:10px;height:10px;border-radius:2px}
.lkey i.g{background:var(--green)}
.lkey i.y{background:var(--amber)}

/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty h3{font-family:'Oswald';font-size:18px;color:var(--navy);margin-bottom:6px;letter-spacing:.04em}

footer{max-width:1080px;margin:0 auto;padding:0 16px 32px;font-size:11px;color:var(--dim);text-align:center}

/* ── Mobile ── */
@media(max-width:600px){
  html,body{overflow-x:hidden;max-width:100vw}
  main{padding:14px 12px 80px}
  nav{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;padding:0 10px}
  nav::-webkit-scrollbar{display:none}
  .tab{font-size:12px;padding:11px 12px 9px;white-space:nowrap}
  .tz-inner{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;gap:5px}
  .tz-inner::-webkit-scrollbar{display:none}
  .tz-label{display:none}
  .groups-grid{grid-template-columns:1fr}
  .live-grid{grid-template-columns:1fr}
  table th:nth-child(3),table td:nth-child(3),
  table th:nth-child(4),table td:nth-child(4),
  table th:nth-child(5),table td:nth-child(5){display:none}
  .fside .tn{display:none}
  .fside .tc{display:inline}
  .fx{padding:10px 10px;gap:6px}
  .fmid{min-width:64px}
  .bigscore{font-size:32px}
}
</style>
</head>

const teamById = Object.fromEntries(DATA.teams.map(t => [t.id, t]));
const stadiumById = Object.fromEntries(DATA.stadia.map(s => [s.id, s]));

function isoToEmoji(iso2) {
  if (!iso2) return "🏳";
  const s = iso2.toUpperCase();
  const L = {"ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","WAL":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","GB-ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","GB-SCT":"🏴󠁧󠁢󠁳󠁣󠁴󠁿"};
  if (L[s]) return L[s];
  if (s.length === 2) return [...s].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join("");
  return "🏳";
}

const $ = s => document.querySelector(s);
const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let TZ = "Australia/Sydney";
let fmtDay  = new Intl.DateTimeFormat("en-AU", {timeZone:TZ, weekday:"long", day:"numeric", month:"long"});
let fmtTime = new Intl.DateTimeFormat("en-AU", {timeZone:TZ, hour:"2-digit", minute:"2-digit", hour12:false});

function setTZ(tz) {
  TZ = tz;
  fmtDay  = new Intl.DateTimeFormat("en-AU", {timeZone:TZ, weekday:"long", day:"numeric", month:"long"});
  fmtTime = new Intl.DateTimeFormat("en-AU", {timeZone:TZ, hour:"2-digit", minute:"2-digit", hour12:false});
}

  b.classList.add("active");
  setTZ(b.dataset.tz);
  renderFixtures();
}));

document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
  document.querySelectorAll(".tab").forEach(x => x.setAttribute("aria-selected", x === t));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("on", v.id === "view-" + t.dataset.view));
}));

function fxStatus(m) {
  if (m.finished || m.status === "finished") return "finished";
  if (m.status === "live") return "live";
  const ko = new Date(m.date_iso), now = new Date();
  if (now > ko && now - ko < 120*60*1000) return "live";
  return "upcoming";
}

function computeStandings() {
  const init = id => ({ team:teamById[id], played:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 });
  const grps = {};
  for (const g of Object.keys(DATA.groups)) grps[g] = DATA.groups[g].map(init);
  for (const m of DATA.games) {
    if (!m.finished) continue;
    const grp = grps[m.group];
    const h = grp.find(r => r.team.id === m.home);
    const a = grp.find(r => r.team.id === m.away);
    if (!h || !a) continue;
    h.played++; a.played++;
    h.gf += m.home_score; h.ga += m.away_score;
    a.gf += m.away_score; a.ga += m.home_score;
    if (m.home_score > m.away_score) { h.w++; h.pts+=3; a.l++; }
    else if (m.home_score < m.away_score) { a.w++; a.pts+=3; h.l++; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  }
  for (const g of Object.keys(grps)) {
    grps[g].forEach(r => r.gd = r.gf - r.ga);
    grps[g].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.team.name.localeCompare(b.team.name));
  }
  return grps;
}

function renderLive() {
  const live = DATA.games.filter(m => fxStatus(m) === "live");
  const grid = $("#liveGrid"); grid.innerHTML = "";
  const badge = $("#liveBadge");
  badge.style.display = live.length ? "inline-block" : "none";
  badge.textContent = live.length;

  if (!live.length) {
    const next = DATA.games.filter(m => fxStatus(m) === "upcoming").sort((a,b) => new Date(a.date_iso)-new Date(b.date_iso))[0];
    const msg = next
      ? `Next match: ${teamById[next.home].name} vs ${teamById[next.away].name} · ${fmtTime.format(new Date(next.date_iso))}`
      : "Group stage complete";
    grid.append(el("div","empty",`<h3>No matches live right now</h3><p>${esc(msg)}</p>`));
    return;
  }

  live.forEach(m => {
    const h = teamById[m.home], a = teamById[m.away];
    const st = stadiumById[m.stadium_id];
    const card = el("div","lcard");
    const minLabel = m.status === "HT" ? "Half Time" : "LIVE";
    card.innerHTML = `
      <div class="lcard-top">
        <span>Group ${esc(m.group)} · MD${m.matchday}</span>
        <span class="live-pip"><span class="pulse"></span>${esc(minLabel)}</span>
      </div>
      <div class="lcard-body">
        <div class="lt"><span class="flag">${isoToEmoji(h.iso2)}</span><span class="name">${esc(h.name)}</span></div>
        <div class="bigscore">${m.home_score ?? 0}–${m.away_score ?? 0}</div>
        <div class="lt"><span class="flag">${isoToEmoji(a.iso2)}</span><span class="name">${esc(a.name)}</span></div>
      </div>
      <div class="lcard-foot">${st ? esc(st.name) + " · " + esc(st.city) : ""}</div>`;
    grid.append(card);
  });
}

function renderFixtures() {
  const wG = $("#fxGroup").value, wM = $("#fxMatchday").value, wS = $("#fxStatus").value;
  const list = $("#fxList"); list.innerHTML = "";
  const fx = DATA.games
    .filter(m => wG === "all" || m.group === wG)
    .filter(m => wM === "all" || String(m.matchday) === wM)
    .filter(m => wS === "all" || fxStatus(m) === wS)
    .sort((a,b) => new Date(a.date_iso) - new Date(b.date_iso));

  if (!fx.length) { list.append(el("div","empty","<h3>No matches</h3><p>Try a different filter</p>")); return; }

  let lastDay = "";
  fx.forEach(m => {
    const d = new Date(m.date_iso);
    const day = fmtDay.format(d);
    if (day !== lastDay) { list.append(el("div","fx-date-hdr",esc(day))); lastDay = day; }
    const st = fxStatus(m), h = teamById[m.home], a = teamById[m.away], stad = stadiumById[m.stadium_id];
    const row = el("div","fx" + (st === "live" ? " live" : ""));
    const mid = st === "upcoming"
      ? `<span class="ko">${fmtTime.format(d)}</span><span class="sub">Grp ${esc(m.group)}</span>`
      : `<span class="score">${m.home_score ?? 0}–${m.away_score ?? 0}</span><span class="sub${st === "live" ? " live-sub" : ""}">${st === "live" ? "LIVE" : "FT"}</span>`;
    row.innerHTML = `
      <div class="fside"><span class="flag">${isoToEmoji(h.iso2)}</span><span class="tn">${esc(h.name)}</span><span class="tc">${esc(h.code)}</span></div>
      <div class="fmid">${mid}</div>
      <div class="fside away"><span class="tn">${esc(a.name)}</span><span class="tc">${esc(a.code)}</span><span class="flag">${isoToEmoji(a.iso2)}</span></div>`;
    if (stad) { const v = el("div","venue-row"); v.textContent = stad.name + " · " + stad.city; row.append(v); }
    list.append(row);
  });
}

function renderGroups() {
  const standings = computeStandings();
  const grid = $("#groupsGrid"); grid.innerHTML = "";
  for (const g of Object.keys(standings).sort()) {
    const card = el("div","gcard");
    card.innerHTML = `<div class="gcard-head"><h2>Group</h2><span class="glet">${esc(g)}</span></div>`;
    const tbl = el("table");
    tbl.innerHTML = `<thead><tr><th class="tcol">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th class="pts">Pts</th></tr></thead>`;
    const tb = el("tbody");
    standings[g].forEach((row, i) => {
      const rank = i+1;
      const tr = el("tr", rank <= 2 ? "q1" : rank === 3 ? "q3" : "");
      tr.innerHTML = `
        <td class="tcol"><div class="row"><span>${isoToEmoji(row.team.iso2)}</span>${esc(row.team.name)}</div></td>
        <td>${row.played}</td><td>${row.w}</td><td>${row.d}</td><td>${row.l}</td>
        <td>${row.gd > 0 ? "+" : ""}${row.gd}</td><td class="pts">${row.pts}</td>`;
      tb.append(tr);
    });
    tbl.append(tb); card.append(tbl); grid.append(card);
  }
}

function populateGroupFilter() {
  const sel = $("#fxGroup");
  sel.innerHTML = `<option value="all">All groups</option>` +
    Object.keys(DATA.groups).sort().map(g => `<option value="${g}">Group ${g}</option>`).join("");
}
["fxGroup","fxMatchday","fxStatus"].forEach(id => $("#"+id).addEventListener("change", renderFixtures));

populateGroupFilter(); renderLive(); renderFixtures(); renderGroups();

/* Live polling */
const POLL_LIVE = 60_000, POLL_IDLE = 10*60_000;
const LIVE_ST = new Set(["1H","HT","2H","ET","BT","P","LIVE","INT"]);
const DONE_ST = new Set(["FT","AET","PEN"]);

function matchGame(r) {
  if (r.gameId) return DATA.games.find(g => g.id === r.gameId) || null;
  return null;
}

function applyRemote(j) {
  if (!j.fixtures) return false;
  let changed = false;
  for (const r of j.fixtures) {
    const local = matchGame(r);
    if (!local) continue;
    const scoreChanged = local.home_score !== (r.home_score ?? 0) || local.away_score !== (r.away_score ?? 0);
    const statusChanged = (LIVE_ST.has(r.status) && local.status !== "live") || (DONE_ST.has(r.status) && !local.finished);
    if (scoreChanged || statusChanged) changed = true;
    if (r.home_score != null) local.home_score = r.home_score;
    if (r.away_score != null) local.away_score = r.away_score;
    if (LIVE_ST.has(r.status)) { local.status = "live"; local.finished = false; }
    else if (DONE_ST.has(r.status) || r.finished) { local.status = "finished"; local.finished = true; }
  }
  return changed;
}

function anyLive() {
  const now = Date.now();
  return DATA.games.some(g => { const ko = new Date(g.date_iso).getTime(); return now >= ko && now <= ko + 9e6 && !g.finished; });
}

async function poll() {
  try {
    const r = await fetch("/api/fixtures", { cache: "no-store" });
    if (!r.ok) return;
    const j = await r.json();
    if (applyRemote(j)) { renderLive(); renderFixtures(); renderGroups(); }
    const tzBtn = document.querySelector(".tz-btn.active");
    $("#stamp").textContent = "Updated " + new Date().toLocaleTimeString("en-AU", {timeZone:TZ, hour:"2-digit", minute:"2-digit", hour12:false}) + " · " + (tzBtn?.dataset.label || "SYD");
  } catch(e) { console.warn("Poll failed:", e.message); }
}

function schedule() { setTimeout(async () => { await poll(); schedule(); }, anyLive() ? POLL_LIVE : POLL_IDLE); }
poll().then(schedule);
</script>
